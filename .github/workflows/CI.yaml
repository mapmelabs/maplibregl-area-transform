name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js x64
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install build dependencies
        run: |
          npm ci
          npm run build

      - name: Run unit tests
        run: |
          npm run test

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js x64
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install build dependencies
        run: |
          npm ci
   
      - name: Build docs
        run: |
          npm run docs
